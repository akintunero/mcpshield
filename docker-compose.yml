services:
  localstack:
    image: localstack/localstack-pro:latest
    container_name: mcpshield-localstack
    ports:
      - '4566:4566'
    volumes:
      - localstack-data:/var/lib/localstack
      - ./scripts/localstack-init:/etc/localstack/init/ready.d
    environment:
      - LOCALSTACK_AUTH_TOKEN=dummy
      - SERVICES=serverless
      - LS_LOG=warn
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1 && aws --endpoint-url=http://localhost:4566 s3 ls > /dev/null 2>&1 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: docker/mcp-server/Dockerfile
    container_name: mcpshield-mcp-server
    ports:
      - '7801:7801'
    volumes:
      - mcpshield-state:/app/.mcpshield-state
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - MCP_TRANSPORT=http
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=7801
      - MCPSHIELD_STATE_DIR=/app/.mcpshield-state
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:7801/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: mcpshield-api
    ports:
      - '7802:7802'
    volumes:
      - mcpshield-state:/app/.mcpshield-state
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - API_HOST=0.0.0.0
      - API_PORT=7802
      - MCPSHIELD_STATE_DIR=/app/.mcpshield-state
    depends_on:
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:7802/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    container_name: mcpshield-agent
    volumes:
      - mcpshield-state:/app/.mcpshield-state
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - MCP_TRANSPORT=http
      - MCP_SERVER_URL=http://mcp-server:7801/sse
      - MCPSHIELD_STATE_DIR=/app/.mcpshield-state
    depends_on:
      mcp-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  localstack-data:
    name: mcpshield-localstack-data
  mcpshield-state:
    name: mcpshield-state
